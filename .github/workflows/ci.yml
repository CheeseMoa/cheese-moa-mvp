name: CI

# mainВ·develop лЊЂмѓЃ PRкіј pushм—ђм„њ м‹¤н–‰ (Git Flow: featureв†’develop, release/hotfixв†’main)
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

# PRмќЂ мѓ€ pushл§€л‹¤ мќґм „ м‹¤н–‰ м·Ём†Њ(head_refлЎњ к·ёлЈ№), main pushлЉ” run_idлЎњ кі мњ  к·ёлЈ№ в†’ м„њлЎњ м·Ём†Њ м•€ н•Ё
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install (clean)
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
